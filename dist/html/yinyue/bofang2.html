<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <!--不缓存设置-->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="style.css?v=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <title style="color: deepskyblue">〇°播放器</title>
    <style>


    </style>
</head>
<body>
<div style="margin: 20px auto; text-align: center;">

    <h1 style="width: 50px;"><button id="music-list-button" style="background-color: transparent;">〇°</button></h1>
    <span id="gequming" style="font-size: 10px">走马(而羡人间).mp3</span><br>
    <audio id="music" src="../../bgm/走马(而羡人间).mp3"></audio>
    <span><input type="range" id="progressBar" min="0" max="100" value="0"></span>
    <span>
        <button id="play-btn" onclick="playMusic()"><i class="fas fa-play"></i></button>
        <button id="pause-btn" onclick="pauseMusic()"><i class="fas fa-pause"></i></button>
    </span>

    <div id="music-list-container">
        <button class="music-list-button" onclick="qiege(this)">一生所爱(伴奏).mp3</button>
        <button class="music-list-button" onclick="qiege(this)">一生所爱.mp3</button>
        <button class="music-list-button" onclick="qiege(this)">听悲伤的情歌(麦小兜).mp3</button>
        <button class="music-list-button" onclick="qiege(this)">圈住你（cover：一口甜）翻唱（淮却）.mp3</button>
        <button class="music-list-button" onclick="qiege(this)">普通disco.mp3</button>
        <button class="music-list-button" onclick="qiege(this)">生日快乐(松鼠Eunice).mp3</button>
        <button class="music-list-button" onclick="qiege(this)">走马(而羡人间).mp3</button>
        <button class="music-list-button" onclick="qiege(this)">走马(陈粒).mp3</button>
        <!-- 添加其他歌曲 -->
    </div>



    <div id="timeDisplay" style="margin-top: 10px;">
        <span style="color: #0bbafa" id="currentTimeDisplay">00:00</span>
        <span style="color: #0bbafa"> / </span>
        <span style="color: #0bbafa" id="totalTimeDisplay">00:00</span>
    </div>
    <div id="lyrics-container" style="margin-top: 0; padding: 0; border: 0 solid #ccc;">

    </div>
    <!--音谱效果-->
    <canvas id="my-canvas" width="400" height="150"></canvas>
    <div class="rotate">
        <canvas id="my-canvas2" width="400" height="70"></canvas>
    </div>
</div>


<script>
    // 音乐
    const music = document.getElementById('music');
    // 进度条
    const progressBar = document.getElementById('progressBar');
    // 显示当前时间
    const currentTimeDisplay = document.getElementById('currentTimeDisplay');
    // 总时长
    const totalTimeDisplay = document.getElementById('totalTimeDisplay');
    // 歌词容器
    const lyricsContainer = document.getElementById('lyrics-container');
    // 歌词行
    const lyricsLines = lyricsContainer.querySelectorAll('.lyrics-line');

    // logo
    const h1 = document.querySelector('h1');

    // 播放暂停按钮
    const playBtn = document.getElementById('play-btn');
    const pauseBtn = document.getElementById('pause-btn');

    // 音谱效果
    const canvasElement = document.getElementById("my-canvas");
    const canvasElement2 = document.getElementById("my-canvas2");

    let activeLineIndex = null;

    /*播放音乐*/
    function playMusic() {
        music.play();
        setInterval(updateProgressBar, 500);
        setInterval(updateTimeDisplay, 500);
        setInterval(updateLyrics, 500);
        // 播放音乐时添加类名
        h1.classList.add('rotating');
        // 隐藏播放按钮、显示暂停按钮
        playBtn.style.display = 'none';
        pauseBtn.style.display = 'inline-block';
        // 开始播放音频，并绘制音谱图
        init();
    }

    /*暂停播放*/
    function pauseMusic() {
        music.pause();
        // 暂停音乐时删除类名
        h1.classList.remove('rotating');
        // 隐藏暂停按钮、显示播放按钮
        pauseBtn.style.display = 'none';
        playBtn.style.display = 'inline-block';
    }


    // 获取歌曲信息
    let musicListContainer = document.getElementById('music-list-container');
    let buttons = musicListContainer.getElementsByTagName('button');
    // 存放歌曲名称
    var buttonTexts = [];
    for (let i = 0; i < buttons.length; i++) {
        let buttonText = buttons[i].textContent;
        buttonTexts.push(buttonText);
    }

    /*更新进度条*/
    function updateProgressBar() {
        const a = (music.currentTime / music.duration) * 100;
        progressBar.value = a;
        if (a === 100) {
            pauseMusic();
            // playMusic();// 单曲循环
            // 列表循环
            for (let i = 0; i < buttonTexts.length; i++) {
                console.log(decodeURIComponent(music.src))
                if(decodeURIComponent(music.src).includes(buttonTexts[i])){
                    let obj={};
                    i=i===buttonTexts.length-1?0:++i;
                    obj.textContent=buttonTexts[i];
                    qiege(obj);
                    break;
                }
            }
        }
    }

    /*更新时间显示*/
    function updateTimeDisplay() {
        const currentTime = formatTime(music.currentTime);
        const totalTime = formatTime(music.duration);
        currentTimeDisplay.innerText = currentTime;
        totalTimeDisplay.innerText = totalTime;
    }

    /*格式时间*/
    function formatTime(time) {
        const minutes = Math.floor(time / 60);
        const seconds = Math.floor(time % 60);
        return `${padZero(minutes)}:${padZero(seconds)}`;
    }

    /*填充0*/
    function padZero(number) {
        return String(number).padStart(2, '0');
    }

    /*更新歌词*/
    function updateLyrics() {
        // 当前时间
        const currentTime = music.currentTime;
        // 当前行
        let currentLineIndex = null;
        for (let i = 0; i < lyricsLines.length; i++) {
            const time = parseFloat(lyricsLines[i].dataset.time);
            if (currentTime >= time) {
                currentLineIndex = i;
            } else {
                break;
            }
        }
        if (currentLineIndex !== activeLineIndex) {
            for (let i = 0; i < lyricsLines.length; i++) {
                const line = lyricsLines[i];
                if (i === currentLineIndex) {
                    line.classList.add('active', 'showing');
                } else if (i === activeLineIndex) {
                    line.classList.remove('active');
                }
                if (i !== currentLineIndex) {
                    line.classList.remove('showing');
                }
            }
            activeLineIndex = currentLineIndex;
        }
    }

    /**更新当前播放时间和总时长的显示，以及进度条的值*/
    music.addEventListener("timeupdate", function () {
        updateTimeDisplay();
        updateLyrics(this.currentTime);
    });
    /**当进度条的值发生变化时，会计算出当前播放时间，并将其设置为音频元素的 currentTime 属性的值*/
    progressBar.addEventListener("input", function () {
        // 当进度条值发生变化时更新当前播放时间
        music.currentTime = (music.duration / 100) * progressBar.value;
    });


    //**************************************************************************************************************

    function init() {
        // 创建 Web Audio API 的上下文
        let audioContext = new AudioContext();

        // 创建 analyser 对象（用于分析音频数据）
        const analyser = audioContext.createAnalyser();

        // 将音频节点连接到 analyser 对象
        const sourceNode = audioContext.createMediaElementSource(music);
        sourceNode.connect(analyser);

        // 将 analyser 对象连接到 Web Audio API 上下文
        analyser.connect(audioContext.destination);

        // 设置频率精度和时间精度
        // analyser.fftSize = 4096;
        // analyser.fftSize = 2048;
        analyser.fftSize = 1024;
        // analyser.fftSize = 512;
        // analyser.fftSize = 256;
        // analyser.fftSize = 128;
        // analyser.fftSize = 64;
        // analyser.fftSize = 32;

        // 获取音频数据
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        const s = draw();

        // 绘制音谱图
        function draw() {
            // 在下一帧继续绘制
            requestAnimationFrame(draw);
            requestAnimationFrame(draw2);

            // 获取音频数据，并绘制音谱图
            analyser.getByteFrequencyData(dataArray);

            let canvasCtx = canvasElement.getContext("2d");
            canvasCtx.globalAlpha = 0.5; // 将背景透明度设置为 0.2
            // canvasCtx.fillStyle = "rgb(11,186,250)";
            // canvasCtx.fillStyle = "rgba(118,191,9,0.33)";
            canvasCtx.fillStyle = "#ffffff";
            canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);

            const barWidth = (canvasElement.width / bufferLength) * 2.5;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i];
                canvasCtx.globalAlpha = 1; // 将背景透明度设置为 0.2
                // canvasCtx.fillStyle = `rgb(${barHeight + 100},191,9)`;
                // canvasCtx.fillStyle = `rgb(${barHeight + 100},191,9)`;
                // canvasCtx.fillStyle = `rgb(${barWidth*2},${barWidth/4},${barWidth+50},1)`;
                canvasCtx.fillStyle = `hsla(${x / 1.5},100%,50%,1)`;
                canvasCtx.fillRect(x, canvasElement.height - barHeight / 2, barWidth, barHeight / 2);

                x += barWidth + 1;
            }
            return '〇°'
        }

        // 绘制音谱图 [倒影]
        function draw2() {
            // 在下一帧继续绘制
            // requestAnimationFrame(draw2);

            // 获取音频数据，并绘制音谱图
            analyser.getByteFrequencyData(dataArray);

            let canvasCtx = canvasElement2.getContext("2d");
            // canvasCtx.globalAlpha = 0.1; // 将背景透明度设置为 0.2
            // canvasCtx.fillStyle = "rgb(11,186,250)";
            // canvasCtx.fillStyle = "rgba(118,191,9,0.33)";
            canvasCtx.fillStyle = "rgb(255,255,255)";
            canvasCtx.fillRect(0, 0, canvasElement2.width, canvasElement2.height);

            const barWidth = (canvasElement2.width / bufferLength) * 2.5;
            let x = 0;

            for (let i = 0; i < bufferLength; i++) {
                const barHeight = dataArray[i];
                canvasCtx.globalAlpha = 0.21; // 将背景透明度设置为 0.2
                // canvasCtx.fillStyle = `rgb(${barHeight + 100},191,9)`;
                // canvasCtx.fillStyle = `rgb(${barHeight + 100},191,9)`;
                // canvasCtx.fillStyle = `rgb(${barWidth*2},${barWidth/4},${barWidth+50},1)`;
                canvasCtx.fillStyle = `hsla(${x / 1.5},100%,75%,1)`;
                canvasCtx.fillRect(x, canvasElement2.height - barHeight / 4, barWidth, barHeight / 4);

                x += barWidth + 1;
            }
            return '〇°'
        }
    }


    // 开始播放音频，并绘制音谱图
    // draw();

    function updateCanvasWidth() {
        // canvasElement.width = window.innerWidth-50;
        canvasElement.width = window.innerWidth - 20;
        canvasElement2.width = window.innerWidth - 20;
    }

    window.addEventListener("resize", updateCanvasWidth);   // 监听窗口大小变化
    updateCanvasWidth();   // 获取初始画布宽度


    // 播放 最近的浏览器版本开始采用更加严格的策略来防止页面在没有用户交互的情况下自动播放音视频
    // const constResize=setTimeout(playMusic, 4000);
</script>


<script>
    let musicListButton = document.getElementById('music-list-button');
    // let musicListContainer = document.getElementById('music-list-container');
    musicListButton.addEventListener('click', function() {
        if (musicListContainer.style.right === '-50%') {   // 如果音乐列表隐藏，则显示出来
            musicListContainer.style.right = '0%';
        } else {   // 如果音乐列表显示中，则隐藏起来
            musicListContainer.style.right = '-50%';
        }
    });

    // 切换歌曲
    function qiege(d){
        let name=d.textContent;//
        let gequming=document.getElementById('gequming')
        gequming.textContent=name;
        let music=document.getElementById('music')
        music.src='../../bgm/'+name;

        playMusic()
    }


</script>

</body>
